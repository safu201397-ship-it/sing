<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- 確保在行動裝置上的顯示比例正確，不可雙指放大干擾掃描 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>現場報到系統 (工作人員專用)</title>
  <!-- 引入強大的相機解讀套件 -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
    
    :root {
      --primary: #2563EB;
      --success: #10B981;
      --error: #EF4444;
      --bg: #111827;
      --surface: #1F2937;
      --text: #F9FAFB;
    }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* 登入遮罩 */
    #loginOverlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg); z-index: 999;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 20px;
    }
    .login-box {
      background: var(--surface); padding: 40px; border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 320px;
    }
    .login-box h2 { margin-top: 0; color: white; }
    .login-box input {
      width: 100%; padding: 15px; font-size: 24px; text-align: center;
      border-radius: 8px; border: none; margin-bottom: 20px; box-sizing: border-box; letter-spacing: 5px;
    }
    .login-box button {
      width: 100%; padding: 15px; background: var(--primary); color: white;
      border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;
    }

    .header {
      width: 100%; padding: 15px; text-align: center;
      background-color: var(--surface); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); z-index: 10;
    }
    .header h1 { margin: 0; font-size: 18px; color: #60A5FA; }

    #reader-container {
      flex: 1; width: 100%; max-width: 600px;
      display: flex; flex-direction: column; position: relative;
    }
    #reader { width: 100%; }

    /* html5-qrcode 相機權限按鈕美化 */
    #reader button {
      background: var(--primary); color: white; border: none; padding: 10px 20px;
      border-radius: 6px; cursor: pointer; margin: 10px; font-size: 14px;
    }
    #reader select { padding: 8px; margin-bottom: 10px; max-width: 90%; }
    
    .fallback-btn {
      background: #0284C7; color: white; border: none; padding: 12px; margin: 10px;
      border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; text-align: center;
    }

    /* Overlay UI for success/error */
    .overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(17, 24, 39, 0.95); z-index: 50;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 20px; text-align: center;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .overlay.active { transform: translateY(0); }
    .overlay.success { border-top: 8px solid var(--success); }
    .overlay.error { border-top: 8px solid var(--error); }
    .overlay.loading { border-top: 8px solid var(--primary); }

    .result-icon { font-size: 72px; margin-bottom: 20px; }
    .success .result-icon { color: var(--success); }
    .error .result-icon { color: var(--error); }

    .participant-info {
      background: white; color: #111827; padding: 30px; border-radius: 16px;
      width: 90%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
    }
    .info-label { font-size: 14px; color: #4B5563; margin-bottom: 4px; }
    .info-value { font-size: 28px; font-weight: bold; color: #111827; margin-bottom: 20px; }
    .info-value.name { font-size: 42px; color: var(--primary); margin-bottom: 0; }

    .error-msg { font-size: 24px; font-weight: bold; }
    .loader {
      border: 5px solid rgba(255,255,255,0.1); border-top: 5px solid var(--primary);
      border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    .overlay-btn {
      margin-top: 30px; background: var(--primary); color: white; border: none;
      padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- 密碼登入畫面 -->
  <div id="loginOverlay">
    <div class="login-box">
      <h2>工作人員登入</h2>
      <p style="color: #9CA3AF; font-size: 14px; margin-bottom: 20px;">請輸入報到系統專用密碼</p>
      <input type="password" id="staffPin" placeholder="密碼 (預設8888)">
      <button onclick="checkLogin()">登入掃描系統</button>
      <p id="loginError" style="color: #EF4444; margin-top: 15px; display: none;">密碼錯誤！</p>
    </div>
  </div>

  <div class="header">
    <h1>現場報到即時掃描後台</h1>
    <div id="connectionStatus" style="font-size: 12px; color: #10B981; margin-top: 3px;">✅ 系統就緒</div>
  </div>

  <div id="reader-container">
    <div id="reader"></div>
    
    <!-- 手機備用區塊 -->
    <div style="text-align: center; margin-top: 10px;">
        <div style="color: #9CA3AF; font-size: 13px; margin-bottom: 10px;">若是鏡頭異常，可點此備用按鈕拍照：</div>
        <input type="file" id="fallbackCamera" accept="image/*" capture="environment" style="display: none;">
        <button class="fallback-btn" onclick="document.getElementById('fallbackCamera').click()">
          📸 啟動拍照輔助模式
        </button>
    </div>
    
    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #374151; display:flex; gap:10px; margin-left: 10px; margin-right:10px;">
       <input type="text" id="manualCode" placeholder="或是手動輸入報到序號" style="flex:1; padding: 12px; border-radius: 6px; border:none; text-align:center;">
       <button onclick="checkManualCode()" style="background:var(--success); color:white; border:none; padding:12px 20px; border-radius:6px; font-weight:bold; cursor:pointer;">手動報到</button>
    </div>
  </div>

  <!-- 用來執行拍照解碼的隱藏區塊 -->
  <div id="file-scanner-reader" style="display: none;"></div>

  <!-- Loading State -->
  <div id="overlayLoading" class="overlay loading">
    <div class="loader"></div>
    <h2>報到資料處理中...</h2>
  </div>

  <!-- Success State -->
  <div id="overlaySuccess" class="overlay success">
    <div class="result-icon">✓</div>
    <div class="participant-info">
      <div class="info-label">服務單位</div>
      <div class="info-value" id="resUnit">某某單位</div>
      <div class="info-label">職稱</div>
      <div class="info-value" id="resTitle">專案經理</div>
      <div class="info-label">姓名</div>
      <div class="info-value name" id="resName">王小明</div>
    </div>
    <button class="overlay-btn" onclick="closeOverlay()">繼續下一位 (或自動關閉)</button>
  </div>

  <!-- Error State -->
  <div id="overlayError" class="overlay error">
    <div class="result-icon">✗</div>
    <div class="error-msg" id="resError">重複報到或無此序號</div>
    <button class="overlay-btn" onclick="closeOverlay()" style="background:var(--error);">關閉並繼續</button>
  </div>

  <script>
    // ==========================================
    // ⚠️ 請在下方雙引號中，貼上您 Google Apps Script 的「部署網址」!
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxKD4ibthTcOPhAhbGTlGc1WqIn4bXlvGGZIM1_Owx3_sq9v-MuREu2jtXsJAB_iSE/exec";
    // ==========================================

    const CORRECT_PIN = "8888"; // 工作人員密碼

    let html5QrcodeScanner;
    let isProcessing = false;
    let autoCloseTimer;

    // --- 登入驗證 ---
    function checkLogin() {
        if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.indexOf("script.google.com") === -1) {
            alert("⚠️ 錯誤：尚未綁定 Google App Script 網址。\n請利用記事本編輯此 HTML 檔案，填入正確的 GAS_WEB_APP_URL。");
            return;
        }

        let input = document.getElementById('staffPin').value;
        if (input === CORRECT_PIN) {
            document.getElementById('loginOverlay').style.display = 'none';
            initScanner(); // 登入成功才開啟相機
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    // 支援按 Enter 登入
    document.getElementById('staffPin').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkLogin();
    });

    // --- 手動輸入 ---
    function checkManualCode() {
        let code = document.getElementById('manualCode').value.trim();
        if (code !== "") {
            processCheckIn(code);
            document.getElementById('manualCode').value = "";
        }
    }

    // --- 相機初始化 ---
    function initScanner() {
      // 解決前置鏡頭問題：強制使用後置相機 (環境相機)
      html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 10, 
        qrbox: {width: 250, height: 250},
        aspectRatio: 1.0,
        videoConstraints: {
          facingMode: "environment" // 強制後畫面
        }
      }, false);
      html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }
    
    function onScanSuccess(decodedText, decodedResult) {
      if (isProcessing) return;
      processCheckIn(decodedText);
    }

    function onScanFailure(error) { }

    // --- 拍照上傳分析 (加入 Canvas 壓縮解法) ---
    document.getElementById('fallbackCamera').addEventListener('change', function(e) {
        if (e.target.files.length == 0) return;
        let file = e.target.files[0];
        document.getElementById('overlayLoading').classList.add('active'); 
        
        let img = new Image();
        let url = URL.createObjectURL(file);

        img.onload = function() {
            let canvas = document.createElement("canvas");
            let ctx = canvas.getContext("2d");
            let maxDim = 800;
            let width = img.width, height = img.height;
            if (width > height && width > maxDim) {
                height = Math.round(height * (maxDim / width)); width = maxDim;
            } else if (height > maxDim) {
                width = Math.round(width * (maxDim / height)); height = maxDim;
            }
            canvas.width = width; canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            
            canvas.toBlob(function(blob) {
                let resizedFile = new File([blob], "compressed_qr.jpg", { type: "image/jpeg" });
                const html5QrCode = new Html5Qrcode("file-scanner-reader");
                
                html5QrCode.scanFile(resizedFile, true)
                .then(decodedText => {
                    document.getElementById('overlayLoading').classList.remove('active');
                    processCheckIn(decodedText);
                    e.target.value = ''; URL.revokeObjectURL(url);
                })
                .catch(err => {
                    document.getElementById('overlayLoading').classList.remove('active');
                    alert("❌ 依然無法解析此照片。請確認條碼置中並無嚴重反光，或直接使用下方手動輸入。");
                    e.target.value = ''; URL.revokeObjectURL(url);
                });
            }, "image/jpeg", 0.9);
        };
        img.src = url;
    });

    // --- 實體條碼槍輸入驗證 ---
    let barcodeBuffer = "";
    let lastKeyTime = 0;
    window.addEventListener("keydown", function(e) {
      if (isProcessing || document.getElementById('loginOverlay').style.display !== 'none') return;
      let currentTime = new Date().getTime();
      if (currentTime - lastKeyTime > 50) barcodeBuffer = "";
      lastKeyTime = currentTime;

      if (e.key === "Enter") {
        if (barcodeBuffer.length > 3) {
          e.preventDefault();
          let scannedCode = barcodeBuffer;
          barcodeBuffer = "";
          processCheckIn(scannedCode);
        }
      } else if (e.key.length === 1) {
        barcodeBuffer += e.key;
      }
    });

    // --- 報到處理邏輯 (升級為高穩定 Fetch API) ---  
    function processCheckIn(code) {
      isProcessing = true;
      try {
        if (html5QrcodeScanner) html5QrcodeScanner.pause(true); // 暫停相機
      } catch(e) { console.log('相機未啟動，略過暫停'); }
      
      document.getElementById('overlayLoading').classList.add('active');
      document.getElementById('overlaySuccess').classList.remove('active');
      document.getElementById('overlayError').classList.remove('active');
      
      // 容錯機制：如果掃到舊版的 QR Code (是一長串網址)，自動提取最後的 UID
      let finalUid = code;
      if (code.includes("uid=")) {
          finalUid = code.split("uid=")[1].split("&")[0];
      }

      // 現代化安全連線寫法 (突破舊版瀏覽器阻擋 JSONP 的問題)
      let requestUrl = GAS_WEB_APP_URL + "?callback=dummyCallback&uid=" + encodeURIComponent(finalUid);

      fetch(requestUrl, { method: "GET", mode: "cors" })
        .then(response => response.text())
        .then(text => {
            // Google 會回傳 "dummyCallback({\"success\":...})" 格式的字串，我們只需要裡面的 JSON
            let jsonString = text.replace("dummyCallback(", "").replace(/\)$/, "");
            let data = JSON.parse(jsonString);
            handleResult(data);
        })
        .catch(error => {
            handleSystemError({message: "網路環境異常，或是被瀏覽器攔截連線！請檢查您的網路訊號。"});
        });
    }

    function handleResult(response) {
      document.getElementById('overlayLoading').classList.remove('active');
      if (response.success) {
        let p = response.participant;
        document.getElementById('resUnit').innerText = p.unit;
        document.getElementById('resTitle').innerText = p.title;
        document.getElementById('resName').innerText = p.name;
        document.getElementById('overlaySuccess').classList.add('active');
        autoCloseTimer = setTimeout(closeOverlay, 3000);
        playAudio("https://www.soundjay.com/buttons/sounds/button-09.mp3");
      } else {
        document.getElementById('resError').innerText = response.message;
        document.getElementById('overlayError').classList.add('active');
        playAudio("https://www.soundjay.com/buttons/sounds/button-10.mp3");
      }
    }

    function handleSystemError(err) {
      document.getElementById('overlayLoading').classList.remove('active');
      document.getElementById('resError').innerText = "系統異常：" + err.message;
      document.getElementById('overlayError').classList.add('active');
    }

    function closeOverlay() {
      clearTimeout(autoCloseTimer);
      document.getElementById('overlaySuccess').classList.remove('active');
      document.getElementById('overlayError').classList.remove('active');
      setTimeout(() => {
        isProcessing = false;
        try {
          if (html5QrcodeScanner) html5QrcodeScanner.resume(); // 喚醒相機
        } catch(e) { }
      }, 300);
    }
    
    function playAudio(url) {
      try { new Audio(url).play().catch(e=>{}); } catch(e) {}
    }
  </script>
</body>
</html>
